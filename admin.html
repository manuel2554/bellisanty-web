<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Bellisanty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: { 'belli-pink': '#be185d', 'belli-cream': '#fffafb' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <nav class="bg-gray-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-widest uppercase">Bellisanty <span class="text-belli-pink font-light">Admin</span></h1>
            <a href="index.html" target="_blank" class="text-sm bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded transition">Ver Tienda →</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10 grid grid-cols-1 lg:grid-cols-3 gap-10">
        
        <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-200 h-fit">
            <h2 class="text-xl font-bold mb-6 text-gray-900 border-b pb-3">Agregar Nuevo Producto</h2>
            
            <form id="form-producto" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Arreglo</label>
                    <input type="text" id="nombre" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-belli-pink focus:border-transparent outline-none">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Precio ($)</label>
                        <input type="number" id="precio" step="0.01" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-belli-pink focus:border-transparent outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Categoría</label>
                        <select id="categoria" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-belli-pink outline-none">
                            <option value="Arreglos Premium">Arreglos Premium</option>
                            <option value="Globos & Helio">Globos & Helio</option>
                            <option value="Regalos al Detal">Regalos al Detal</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">URL de la Imagen (Link)</label>
                    <input type="url" id="imagen" required placeholder="https://ejemplo.com/foto.jpg" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-belli-pink outline-none text-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Descripción Breve</label>
                    <textarea id="descripcion" rows="2" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-belli-pink outline-none text-sm"></textarea>
                </div>

                <button type="submit" id="btn-guardar" class="w-full bg-belli-pink text-white font-bold py-3 rounded-lg hover:bg-pink-800 transition shadow-md">
                    Guardar Producto
                </button>
            </form>
        </div>

        <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
            <h2 class="text-xl font-bold mb-6 text-gray-900 border-b pb-3">Inventario Actual</h2>
            <div id="lista-inventario" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-gray-500 text-sm">Cargando inventario...</p>
            </div>
        </div>

    </main>

    <script>
        // CONEXIÓN A SUPABASE
        const supabaseUrl = 'https://sgcmrkyrxtvcohrmagxx.supabase.co';
        const supabaseKey = 'sb_publishable_hIHWpxtZ-diihL_3-Dp1nw_XzaBIpxu';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Cargar productos al iniciar
        async function cargarInventario() {
            const { data, error } = await supabase.from('productos').select('*').order('id', { ascending: false });
            
            if (error) {
                console.error("Error cargando:", error);
                return;
            }

            const contenedor = document.getElementById('lista-inventario');
            contenedor.innerHTML = '';

            if(data.length === 0) {
                contenedor.innerHTML = '<p class="text-gray-500 text-sm">No hay productos en el inventario.</p>';
                return;
            }

            data.forEach(producto => {
                contenedor.innerHTML += `
                    <div class="flex gap-4 border border-gray-100 p-3 rounded-xl items-center hover:bg-gray-50">
                        <img src="${producto.image}" class="w-16 h-16 object-cover rounded-lg bg-gray-200">
                        <div class="flex-1 min-w-0">
                            <h4 class="font-bold text-sm text-gray-900 truncate">${producto.name}</h4>
                            <p class="text-xs text-gray-500">${producto.category} • $${producto.price}</p>
                        </div>
                        <button onclick="eliminarProducto(${producto.id})" class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;
            });
        }

        // Guardar nuevo producto
        document.getElementById('form-producto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-guardar');
            btn.innerText = "Guardando...";

            const nuevoProducto = {
                name: document.getElementById('nombre').value,
                price: parseFloat(document.getElementById('precio').value),
                category: document.getElementById('categoria').value,
                image: document.getElementById('imagen').value,
                description: document.getElementById('descripcion').value
            };

            const { error } = await supabase.from('productos').insert([nuevoProducto]);

            if (error) {
                alert("Error al guardar: Verifique su API Key de Supabase.");
                console.error(error);
            } else {
                document.getElementById('form-producto').reset();
                cargarInventario();
            }
            btn.innerText = "Guardar Producto";
        });

        // Eliminar producto
        async function eliminarProducto(id) {
            if(confirm("¿Estás seguro de eliminar este producto?")) {
                await supabase.from('productos').delete().eq('id', id);
                cargarInventario();
            }
        }

        // Iniciar
        cargarInventario();
    </script>
</body>
</html>
